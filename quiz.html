<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Profil Anketi - Zatu">
  <link rel="icon" href="logo-main.png" type="image/png">
  
  <!-- bootstarp css file -->
  <link rel="stylesheet" href="css/bootstrap.min.css">
  
  <!-- bootstrap icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  
  <!-- Google font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- main css file -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/quiz.css">
  
  <title>Profil Anketi | Zatu</title>
</head>
<body>
  <!-- Quiz Header (Minimal) -->
  <header class="quiz-header">
    <div class="quiz-header-content">
      <a href="index.html" class="quiz-header-logo">
        <img src="logo-main.png" alt="Zatu" class="quiz-logo-img">
      </a>
      <h2 class="quiz-header-title">Test</h2>
      <button class="quiz-header-close" id="quiz-close-btn" aria-label="Kapat">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
  </header>

  <!-- Quiz Container -->
  <main class="quiz-container" id="quiz-container">
    <!-- Progress Header -->
    <div class="quiz-progress-header" id="quiz-progress-header">
      <div class="quiz-progress-info">
        <span class="quiz-step-label" id="quiz-step-label">Soru 1/5</span>
        <span class="quiz-progress-percent" id="quiz-progress-percent">20%</span>
      </div>
      <div class="quiz-progress-bar-wrapper">
        <div class="quiz-progress-bar" id="quiz-progress-bar"></div>
      </div>
    </div>

    <!-- Question Card -->
    <div class="quiz-card" id="quiz-card">
      <div class="quiz-question-wrapper">
        <h1 class="quiz-question-title" id="quiz-question-title"></h1>
        <p class="quiz-question-helper" id="quiz-question-helper"></p>
      </div>

      <div class="quiz-input-wrapper" id="quiz-input-wrapper">
        <!-- Input components will be rendered here -->
      </div>

      <div class="quiz-error-message" id="quiz-error-message"></div>

      <div class="quiz-actions">
        <button class="quiz-btn quiz-btn-secondary" id="quiz-back-btn" type="button">
          <i class="bi bi-arrow-left"></i> Geri
        </button>
        <button class="quiz-btn quiz-btn-primary" id="quiz-next-btn" type="button" disabled>
          Devam <i class="bi bi-arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- Result Screen (Hidden initially) -->
    <div class="quiz-result-screen" id="quiz-result-screen" style="display: none;">
      <div class="quiz-result-card">
        <div class="quiz-result-icon">
          <i class="bi bi-check-circle-fill"></i>
        </div>
        <h1 class="quiz-result-title">Sonucun Hazır</h1>
        <div class="quiz-result-badge" id="quiz-result-badge"></div>
        <p class="quiz-result-description" id="quiz-result-description"></p>
        <div class="quiz-result-actions">
          <a href="index.html#profilini-tamamla" class="quiz-btn quiz-btn-primary quiz-btn-full">
            Profili Tamamla
          </a>
          <a href="index.html" class="quiz-btn quiz-btn-secondary quiz-btn-full">
            Ana Sayfaya Dön
          </a>
        </div>
      </div>
    </div>
  </main>

  <!-- Scripts -->
  <script src="js/quiz.js"></script>
</body>
</html>
